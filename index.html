<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>홀리 그레이스, 당신을 위한 페이지</title>

  <meta property="og:title" content="홀리 그레이스, 당신을 위한 페이지" />
  <meta property="og:description" content="다가올 전체모임, 설교, 셀 모임 나눔지를 한눈에 확인하세요." />
  <meta property="og:image" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/images/poster.jpg" />
  <meta property="og:url" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/" />
  <meta property="og:type" content="website" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #fff3ea 0%, #ffeef5 45%, #f7f3ff 100%);
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 18px;
    }

    .hero {
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.9), transparent 28%),
                  linear-gradient(135deg, #ffdce8, #fff5dc);
      border-radius: 28px;
      padding: 38px 18px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(120, 80, 80, 0.14);
    }

    .hero h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: -1px;
    }

    .hero span {
      display: block;
      font-size: 18px;
      font-weight: 600;
      margin-top: 8px;
      color: #6f5f5f;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(70, 50, 50, 0.11);
    }

    .section {
      padding: 16px;
    }

    .section-title {
      display: inline-block;
      margin: 0 0 12px;
      padding: 6px 11px;
      border-radius: 999px;
      background: #fff1f5;
      color: #8a4b5d;
      font-size: 14px;
      font-weight: 800;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .image-wrap,
    .video-card,
    .group-preview-img {
      overflow: hidden;
      border-radius: 14px;
    }

    .image-wrap img,
    .video-card img,
    .group-preview-img img {
      transition: transform 0.25s ease;
    }

    .image-wrap:hover img,
    .video-card:hover img,
    .group-preview-img:hover img {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      display: block;
      text-decoration: none;
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .sermon-video {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .group-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .group-preview-img {
      position: relative;
    }

    .page-label {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.68);
      color: white;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      z-index: 2;
    }

    .group-preview-img img {
      height: 180px;
      object-fit: cover;
      object-position: top;
    }

    .contact-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 auto 14px;
      max-width: 270px;
      justify-content: center;
    }

    .profile-img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #fff1f5;
      box-shadow: 0 6px 14px rgba(0,0,0,0.14);
      cursor: default;
      flex-shrink: 0;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .contact-info {
      text-align: left;
    }

    .contact-name {
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 4px;
    }

    .contact-phone {
      font-size: 15px;
      color: #555;
      margin: 0;
    }

    .contact-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      background: #111;
      color: white;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      display: block;
      border-radius: 12px;
      font-weight: 800;
      font-size: 14px;
    }

    .kakao-btn {
      background: #FEE500;
      color: #000;
    }

    .modal {
      display: none;
      position: fixed;
      background: rgba(0,0,0,0.85);
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
      z-index: 999;
      left: 0;
      top: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      max-width: 100%;
      text-align: center;
    }

    .modal img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      cursor: default;
      border-radius: 12px;
    }

    .download-btn {
      margin-top: 10px;
      background: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      font-weight: bold;
    }

    .top-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #111;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>
        홀리 그레이스<br>
        <span>당신을 위한 페이지</span>
      </h1>
    </div>

    <!-- 이하 기존 그대로 유지 -->
