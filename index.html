<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>홀리 그레이스</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .hero {
      background: linear-gradient(135deg, #ffe4ec, #fff7e6);
      border-radius: 24px;
      padding: 30px 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.35;
    }

    .hero span {
      display: block;
      font-size: 18px;
      font-weight: 500;
      margin-top: 6px;
      color: #666;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .section {
      padding: 16px;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: black;
    }

    .video-card img,
    .group-preview img {
      transition: transform 0.25s ease;
    }

    .video-card:hover img,
    .group-preview img:hover {
      transform: scale(1.05);
    }

    .btn {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-weight: bold;
      border-radius: 10px;
    }

    .group-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
      overflow: hidden;
    }

    .group-preview img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top;
      border-radius: 12px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 100%;
      max-height: 100%;
    }

    .modal img {
      max-width: 100%;
      max-height: 82vh;
      width: auto;
      height: auto;
      object-fit: contain;
      cursor: default;
      border-radius: 12px;
    }

    .download-btn {
      margin-top: 12px;
      background: white;
      color: black;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>
        홀리 그레이스<br>
        <span>당신을 위한 페이지</span>
      </h1>
    </div>

    <div class="card">
      <div class="section">
        <h3>다가올 전체모임</h3>
      </div>
      <img src="images/poster.jpg" alt="메인 포스터">
    </div>

    <div class="card section">
      <h3>지난 사역</h3>
      <div class="grid" id="videoGrid"></div>
    </div>

    <div class="card section">
      <h3>이번 주 설교</h3>
      <a href="https://www.youtube.com/watch?v=REPUe3-pcpk" target="_blank" rel="noopener noreferrer">
        <img src="https://img.youtube.com/vi/REPUe3-pcpk/maxresdefault.jpg" alt="이번 주 설교 썸네일">
        <div class="btn">설교 영상 보기</div>
      </a>
    </div>

    <div class="card">
      <div class="section">
        <h3>이번주 셀 모임 나눔지</h3>
      </div>

      <div class="group-preview">
        <img src="images/group1.jpg" onclick="openModal('images/group1.jpg')" alt="나눔지 1">
        <img src="images/group2.jpg" onclick="openModal('images/group2.jpg')" alt="나눔지 2">
      </div>
    </div>

  </div>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modalImage" src="" alt="확대 이미지">
      <a id="downloadBtn" class="download-btn" download>다운로드</a>
    </div>
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("imageModal").style.display = "flex";

      const downloadBtn = document.getElementById("downloadBtn");
      downloadBtn.href = src;
      downloadBtn.setAttribute("download", src.split("/").pop());
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    const videos = [
      "https://www.youtube.com/watch?v=8NuUE9hktHQ",
      "https://www.youtube.com/watch?v=dDABgYxqRBs",
      "https://www.youtube.com/watch?v=BUZNMMJHhV8",
      "https://www.youtube.com/watch?v=4vtLpKlUjp8"
    ];

    const grid = document.getElementById("videoGrid");

    videos.forEach(url => {
      const videoId = new URL(url).searchParams.get("v");

      const card = document.createElement("a");
      card.className = "video-card";
      card.href = url;
      card.target = "_blank";
      card.rel = "noopener noreferrer";

      card.innerHTML = `
        <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg" alt="지난 사역 영상 썸네일">
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
