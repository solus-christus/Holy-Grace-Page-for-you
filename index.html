<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>홀리 그레이스</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    /* 히어로 제목 */
    .hero {
      background: linear-gradient(135deg, #ffe4ec, #fff7e6);
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.4;
    }

    .hero span {
      display: block;
      font-size: 16px;
      font-weight: 500;
      margin-top: 6px;
      color: #666;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .section {
      padding: 16px;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: black;
    }

    .video-title {
      font-size: 12px;
      padding: 6px;
      line-height: 1.3;
    }

    .btn {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-weight: bold;
    }

    /* 나눔지 미리보기 */
    .group-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .group-preview img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      object-position: top;
      border-radius: 12px;
    }

    /* 이미지 확대 */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal img {
      max-width: 100%;
      max-height: 90%;
      width: auto;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- 상단 제목 -->
    <div class="hero">
      <h1>
        홀리 그레이스<br>
        <span>당신을 위한 페이지</span>
      </h1>
    </div>

    <!-- 메인 포스터 -->
    <div class="card">
      <img src="images/poster.jpg" alt="메인 포스터">
    </div>

    <!-- 지난 사역 -->
    <div class="card section">
      <h3>지난 사역</h3>
      <div class="grid" id="videoGrid"></div>
    </div>

    <!-- 이번 주 설교 -->
    <div class="card section">
      <h3>이번 주 설교</h3>
      <a href="https://www.youtube.com/watch?v=REPUe3-pcpk" target="_blank">
        <img src="https://img.youtube.com/vi/REPUe3-pcpk/maxresdefault.jpg">
        <div class="btn">설교 영상 보기</div>
      </a>
    </div>

    <!-- 셀 모임 나눔지 -->
    <div class="card">
      <div class="section">
        <h3>이번주 셀 모임 나눔지</h3>
      </div>

      <div class="group-preview">
        <img src="images/group1.jpg" onclick="openModal('images/group1.jpg')">
        <img src="images/group2.jpg" onclick="openModal('images/group2.jpg')">
      </div>
    </div>

  </div>

  <!-- 이미지 확대 모달 -->
  <div id="imageModal" class="modal" onclick="closeModal()">
    <img id="modalImage" src="">
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("imageModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    // 유튜브 자동 제목
    const videos = [
      "https://www.youtube.com/watch?v=8NuUE9hktHQ",
      "https://www.youtube.com/watch?v=dDABgYxqRBs",
      "https://www.youtube.com/watch?v=BUZNMMJHhV8",
      "https://www.youtube.com/watch?v=4vtLpKlUjp8"
    ];

    const grid = document.getElementById("videoGrid");

    videos.forEach(url => {
      const videoId = url.split("v=")[1];

      fetch(`https://www.youtube.com/oembed?url=${url}&format=json`)
        .then(res => res.json())
        .then(data => {
          const card = document.createElement("a");
          card.className = "video-card";
          card.href = url;
          card.target = "_blank";

          card.innerHTML = `
            <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg">
            <div class="video-title">${data.title}</div>
          `;

          grid.appendChild(card);
        })
        .catch(() => {
          const card = document.createElement("a");
          card.className = "video-card";
          card.href = url;
          card.target = "_blank";

          card.innerHTML = `
            <img src="https://img.youtube.com/vi/${videoId}/maxresdefault.jpg">
            <div class="video-title">영상 보기</div>
          `;

          grid.appendChild(card);
        });
    });
  </script>

</body>
</html>
