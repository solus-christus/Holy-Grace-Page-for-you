<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>홀리 그레이스, 당신을 위한 페이지</title>

  <meta property="og:title" content="홀리 그레이스, 당신을 위한 페이지" />
  <meta property="og:description" content="다가올 전체모임, 설교, 나눔지를 한눈에 확인하세요." />
  <meta property="og:image" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/images/poster.jpg" />
  <meta property="og:url" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/" />
  <meta property="og:type" content="website" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    .hero {
      background: linear-gradient(135deg, #ffe4ec, #fff7e6);
      border-radius: 24px;
      padding: 30px 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
    }

    .hero span {
      display: block;
      font-size: 18px;
      margin-top: 6px;
      color: #666;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .section {
      padding: 16px;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .image-wrap,
    .video-card,
    .group-preview-img {
      overflow: hidden;
      border-radius: 12px;
    }

    .image-wrap img,
    .video-card img,
    .group-preview-img img {
      transition: transform 0.25s ease;
    }

    .image-wrap:hover img,
    .video-card:hover img,
    .group-preview-img:hover img {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      display: block;
      text-decoration: none;
      color: black;
    }

    .btn {
      background: black;
      color: white;
      padding: 10px;
      text-align: center;
      text-decoration: none;
      display: block;
      border-radius: 10px;
      font-weight: bold;
    }

    .kakao-btn {
      background: #FEE500;
      color: #000;
    }

    .group-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .group-preview-img img {
      height: 180px;
      object-fit: cover;
      object-position: top;
    }

    .sermon-video {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .modal {
      display: none;
      position: fixed;
      background: rgba(0,0,0,0.85);
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
      z-index: 999;
      left: 0;
      top: 0;
    }

    .modal-content {
      max-width: 100%;
      text-align: center;
    }

    .modal img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      cursor: default;
      border-radius: 12px;
    }

    .download-btn {
      margin-top: 10px;
      background: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      font-weight: bold;
    }

    .top-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: black;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>
        홀리 그레이스<br>
        <span>당신을 위한 페이지</span>
      </h1>
    </div>

    <div class="card">
      <div class="section">
        <h3>다가올 전체모임</h3>
      </div>
      <div class="image-wrap" onclick="openModal('images/poster.jpg')">
        <img src="images/poster.jpg" alt="다가올 전체모임 포스터">
      </div>
    </div>

    <div class="card section">
      <h3>지난 사역 돌아보기</h3>
      <div class="grid" id="videoGrid"></div>
    </div>

    <div class="card section">
      <h3>이번 주 설교</h3>
      <div class="sermon-video">
        <iframe
          src="https://www.youtube.com/embed/videoseries?list=PLf7eFhhHay759LzayhGhfnf1EKK6GjNSJ"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h3>이번주 셀 모임 나눔지</h3>
      </div>

      <div class="group-preview">
        <div class="group-preview-img" onclick="openModal('images/group1.jpg')">
          <img src="images/group1.jpg" alt="나눔지 1">
        </div>

        <div class="group-preview-img" onclick="openModal('images/group2.jpg')">
          <img src="images/group2.jpg" alt="나눔지 2">
        </div>
      </div>
    </div>

    <div class="card section">
      <h3>담당교역자 문의</h3>

      <p>
        황지후 목사<br>
        010-9798-6947
      </p>

      <a class="btn" href="tel:01097986947">전화하기</a>

      <a class="btn kakao-btn"
         href="https://qr.kakao.com/talk/DYfdZ.5cvj0rMZYvXZOHLnIXGiU-"
         target="_blank"
         rel="noopener noreferrer"
         style="margin-top:8px;">
        카카오톡 문의
      </a>
    </div>

  </div>

  <button class="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modalImage" src="" alt="확대 이미지">
      <br>
      <a id="downloadBtn" class="download-btn" download>다운로드</a>
    </div>
  </div>

  <script>
    function openModal(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("downloadBtn").href = src;
      document.getElementById("downloadBtn").setAttribute("download", src.split("/").pop());
      document.getElementById("imageModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    const videos = [
      "8NuUE9hktHQ",
      "dDABgYxqRBs",
      "BUZNMMJHhV8",
      "4vtLpKlUjp8"
    ];

    videos.forEach(id => {
      videoGrid.innerHTML += `
        <a class="video-card" href="https://youtube.com/watch?v=${id}" target="_blank" rel="noopener noreferrer">
          <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" alt="지난 사역 영상 썸네일">
        </a>
      `;
    });
  </script>

</body>
</html>
