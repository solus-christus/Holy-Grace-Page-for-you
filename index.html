<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>홀리 그레이스</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .section {
      padding: 16px;
    }

    img {
      width: 100%;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: black;
    }

    .video-title {
      font-size: 12px;
      padding: 6px;
      line-height: 1.3;
    }

    .btn {
      background: black;
      color: white;
      text-align: center;
      padding: 10px;
      text-decoration: none;
      display: block;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>홀리 그레이스, 당신을 위한 페이지</h1>

    <!-- 메인 포스터 -->
    <div class="card">
      <img src="images/poster.jpg" alt="메인 포스터">
    </div>

    <!-- 지난 사역 -->
    <div class="card section">
      <h3>지난 사역</h3>

      <div class="grid">

        <a class="video-card" href="https://www.youtube.com/watch?v=8NuUE9hktHQ" target="_blank">
          <img src="https://img.youtube.com/vi/8NuUE9hktHQ/maxresdefault.jpg">
          <div class="video-title">최근 사역</div>
        </a>

        <a class="video-card" href="https://www.youtube.com/watch?v=dDABgYxqRBs" target="_blank">
          <img src="https://img.youtube.com/vi/dDABgYxqRBs/maxresdefault.jpg">
          <div class="video-title">사역 영상</div>
        </a>

        <a class="video-card" href="https://www.youtube.com/watch?v=BUZNMMJHhV8" target="_blank">
          <img src="https://img.youtube.com/vi/BUZNMMJHhV8/maxresdefault.jpg">
          <div class="video-title">사역 영상</div>
        </a>

        <a class="video-card" href="https://www.youtube.com/watch?v=4vtLpKlUjp8" target="_blank">
          <img src="https://img.youtube.com/vi/4vtLpKlUjp8/maxresdefault.jpg">
          <div class="video-title">사역 영상</div>
        </a>

      </div>
    </div>

    <!-- 이번 주 설교 -->
    <div class="card section">
      <h3>이번 주 설교</h3>

      <a href="https://www.youtube.com/watch?v=REPUe3-pcpk" target="_blank">
        <img src="https://img.youtube.com/vi/REPUe3-pcpk/maxresdefault.jpg">
        <div class="btn">설교 영상 보기</div>
      </a>
    </div>

    <!-- 셀 모임 나눔지 -->
    <div class="card">
      <div class="section">
        <h3>이번주 셀 모임 나눔지</h3>
      </div>

      <img src="images/group1.jpg" alt="나눔지 1">
      <img src="images/group2.jpg" alt="나눔지 2">
    </div>

  </div>
</body>
</html>
