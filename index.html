<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>홀리 그레이스, 당신을 위한 페이지</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <meta property="og:title" content="홀리 그레이스, 당신을 위한 페이지" />
  <meta property="og:description" content="다가올 전체모임, 설교, 셀 모임 나눔지를 한눈에 확인하세요." />
  <meta property="og:image" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/images/poster.jpg" />
  <meta property="og:url" content="https://solus-christus.github.io/Holy-Grace-Page-for-you/" />
  <meta property="og:type" content="website" />

  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #fff3ea 0%, #ffeef5 45%, #f7f3ff 100%);
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 18px;
    }

    .hero {
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.9), transparent 28%),
                  linear-gradient(135deg, #ffdce8, #fff5dc);
      border-radius: 28px;
      padding: 38px 18px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(120, 80, 80, 0.14);
    }

    .hero h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 900;
      line-height: 1.25;
    }

    .hero span {
      display: block;
      font-size: 18px;
      font-weight: 600;
      margin-top: 8px;
      color: #6f5f5f;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(70, 50, 50, 0.11);
    }

    .section {
      padding: 16px;
    }

    .section-title {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 11px;
      border-radius: 999px;
      background: #fff1f5;
      color: #8a4b5d;
      font-size: 14px;
      font-weight: 800;
    }

    img {
      width: 100%;
      display: block;
      cursor: pointer;
    }

    .image-wrap,
    .video-card,
    .group-preview-img {
      overflow: hidden;
      border-radius: 14px;
    }

    .image-wrap img,
    .video-card img,
    .group-preview-img img {
      transition: transform 0.25s ease;
    }

    .image-wrap:hover img,
    .video-card:hover img,
    .group-preview-img:hover img {
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .video-card {
      display: block;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .sermon-video {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .group-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .group-preview-img {
      position: relative;
    }

    .page-label {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.68);
      color: white;
      font-size: 12px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      z-index: 2;
    }

    .group-preview-img img {
      height: 180px;
      object-fit: cover;
      object-position: top;
    }

    .contact-profile {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 auto 14px;
      max-width: 290px;
      justify-content: center;
    }

    .profile-img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .contact-info {
      text-align: left;
    }

    .contact-name {
      font-size: 20px;
      font-weight: 900;
    }

    .contact-phone,
    .contact-kakao {
      font-size: 15px;
      color: #555;
      margin-top: 3px;
    }

    .contact-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      background: linear-gradient(135deg, #2f2a2a, #111);
      color: white;
      padding: 13px;
      text-align: center;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .kakao-btn {
      background: linear-gradient(135deg, #FEE500, #FFD43B);
      color: #000;
    }

    .modal {
      display: none;
      position: fixed;
      background: rgba(0,0,0,0.85);
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
      z-index: 999;
      left: 0;
      top: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .modal-content {
      max-width: 100%;
      text-align: center;
    }

    .modal-content img {
      max-width: 100%;
      max-height: 80vh;
      width: auto;
      height: auto;
      object-fit: contain;
      cursor: pointer;
      border-radius: 12px;
    }

    .download-btn {
      margin-top: 10px;
      background: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      color: black;
      display: inline-block;
      font-weight: bold;
    }

    .top-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #111;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>홀리 그레이스<br><span>당신을 위한 페이지</span></h1>
    </div>

    <div class="card">
      <div class="section">
        <h3 class="section-title">다가올 전체모임</h3>
      </div>
      <div class="image-wrap" onclick="openModal('images/poster.jpg')">
        <img src="images/poster.jpg" alt="다가올 전체모임 포스터">
      </div>
    </div>

    <div class="card section">
      <h3 class="section-title">지난 사역 돌아보기</h3>
      <div class="grid" id="videoGrid"></div>
    </div>

    <div class="card section">
      <h3 class="section-title">이번 주 설교</h3>
      <div class="sermon-video">
        <iframe
          src="https://www.youtube.com/embed/videoseries?list=PLf7eFhhHay759LzayhGhfnf1EKK6GjNSJ"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="card">
      <div class="section">
        <h3 class="section-title">이번주 셀 모임 나눔지</h3>
      </div>

      <div class="group-preview">
        <div class="group-preview-img" onclick="openModal('images/group1.jpg')">
          <span class="page-label">1쪽</span>
          <img src="images/group1.jpg" alt="나눔지 1">
        </div>

        <div class="group-preview-img" onclick="openModal('images/group2.jpg')">
          <span class="page-label">2쪽</span>
          <img src="images/group2.jpg" alt="나눔지 2">
        </div>
      </div>
    </div>

    <div class="card section">
      <h3 class="section-title">담당교역자 문의</h3>

      <div class="contact-profile">
        <img class="profile-img" src="images/profile.jpg" alt="황지후 목사 사진" draggable="false" oncontextmenu="return false;">

        <div class="contact-info">
          <div class="contact-name">황지후 목사</div>
          <div class="contact-phone">010-9798-6947</div>
          <div class="contact-kakao">카카오톡 ID : solus.christus</div>
        </div>
      </div>

      <div class="contact-buttons">
        <a class="btn" href="tel:01097986947">전화하기</a>
        <a class="btn kakao-btn" href="https://qr.kakao.com/talk/DYfdZ.5cvj0rMZYvXZOHLnIXGiU-" target="_blank" rel="noopener noreferrer">
          카카오톡 문의
        </a>
      </div>
    </div>

  </div>

  <button class="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <img id="modalImage" src="" alt="확대 이미지" onclick="closeModal()">
      <br>
      <a id="downloadBtn" class="download-btn" download>다운로드</a>
    </div>
  </div>

  <script>
    function openModal(src) {
      const modal = document.getElementById("imageModal");
      const modalImage = document.getElementById("modalImage");
      const downloadBtn = document.getElementById("downloadBtn");

      modalImage.src = src;
      downloadBtn.href = src;
      downloadBtn.setAttribute("download", src.split("/").pop());

      modal.style.display = "flex";
    }

    function closeModal() {
      const modal = document.getElementById("imageModal");
      const modalImage = document.getElementById("modalImage");

      modal.style.display = "none";
      modalImage.src = "";
    }

    const videos = ["8NuUE9hktHQ","dDABgYxqRBs","BUZNMMJHhV8","4vtLpKlUjp8"];
    const videoGrid = document.getElementById("videoGrid");

    videos.forEach(id => {
      videoGrid.innerHTML += `
        <a class="video-card" href="https://youtube.com/watch?v=${id}" target="_blank" rel="noopener noreferrer">
          <img src="https://img.youtube.com/vi/${id}/maxresdefault.jpg" alt="지난 사역 영상 썸네일">
        </a>`;
    });
  </script>

</body>
</html>
